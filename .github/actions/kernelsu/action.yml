name: Setup KernelSU-Next
description: Download and configure KernelSU-Next with version tracking
inputs:
  ksu_branch:
    description: 'KernelSU-Next branch or commit (empty = latest stable branch tip)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download and Sync KernelSU-Next
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KSU_INPUT="${{ inputs.ksu_branch }}"
        if [ -z "$KSU_INPUT" ]; then
          KSU_INPUT="stable"
        fi

        echo "Initializing KernelSU-Next via setup script..."
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s stable

        cd KernelSU-Next
        
        echo "Fetching target ref: $KSU_INPUT"
        git fetch --depth=50 origin "$KSU_INPUT"
        git checkout FETCH_HEAD

        COMMITS_COUNT=$(git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$((COMMITS_COUNT + BASE_VERSION))
        KSU_COMMIT=$(git rev-parse --short HEAD)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")

        echo "Injecting tracking flags into Kbuild..."
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" kernel/Kbuild
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" kernel/Kbuild

        echo "Exporting build environment variables..."
        echo "KSU_GIT_TAG=${KSU_GIT_TAG}" >> $GITHUB_ENV
        echo "KSU_VERSION=${KSU_VERSION}" >> $GITHUB_ENV
        echo "KSU_COMMIT=${KSU_COMMIT}" >> $GITHUB_ENV
        
        echo "Summary: Version ${KSU_VERSION} (${KSU_GIT_TAG}) at commit ${KSU_COMMIT}"

    - name: Apply Static Patches
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU-Next
      run: |
        set -euo pipefail
        PATCH_PATH="${{ github.action_path }}/patches/static.patch"
        
        if [ -f "$PATCH_PATH" ]; then
          patch -p1 < "$PATCH_PATH"
          echo "✅ Static patch successfully applied"
        else
          echo "ℹ️ No static patch found at $PATCH_PATH, skipping."
        fi

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
