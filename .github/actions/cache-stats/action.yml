name: 'Show Cache Stats'
description: 'Displays statistics for ccache and Bazel remote cache to help analyze cache performance and hit rates'
inputs:
  clear_stats:
    description: 'Whether to clear ccache stats after displaying (default: true)'
    required: true
    type: boolean
    default: true

runs:
  using: 'composite'
  steps:
    - name: Define cache summary helper
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        cat > /tmp/cache_summary.sh <<'EOF'
        summarize_dir() {
          local path="$1"
          local top_n=${2:-10}
          local sub_n=${3:-5}
          if [ ! -e "$path" ]; then
            echo "Path $path not found"
            return
          fi
          echo "---------------"
          echo "Summary: $path"
          du -sh "$path" || true
          echo "Top ${top_n} entries at top level:"
          du -h --max-depth=1 "$path" 2>/dev/null | sort -hr | head -n "$top_n" || true
          echo "Showing up to ${sub_n} entries one level deeper for the largest top-level items:"
          while read -r line; do
            entry_path=$(echo "$line" | awk '{print $2}')
            [ -z "$entry_path" ] && continue
            if [ "$entry_path" = "$path" ]; then
              continue
            fi
            echo "-> $entry_path :"
            du -h --max-depth=1 "$entry_path" 2>/dev/null | sort -hr | head -n "$sub_n" || true
          done < <(du -h --max-depth=1 "$path" 2>/dev/null | sort -hr | head -n "$top_n")
          echo "---------------"
        }
        EOF

    - name: Show ccache Stats
      shell: bash
      working-directory: ${{ github.workspace }}
      run: "set -euo pipefail\necho \"====================\"\necho \"=== ccache stats ===\"\necho \"====================\"\n      #magic___^_^___line\nif ! command -v ccache >/dev/null 2>&1; then\n  echo \"⚠️  ccache not installed, skipping ccache stats\"\n  echo \"====================\"\n  exit 0\nfi\n      #magic___^_^___line\nccache -s || true\necho \"=====================\"\necho \"=== ccache config ===\"\necho \"=====================\"\nccache -p || true\necho \"=====================\"\n      #magic___^_^___line\nSTATS=\"$(ccache -s)\"\n      #magic___^_^___line\nCACHEABLE=$(echo \"$STATS\" | awk '/Cacheable calls:/ {\n  match($0, /[0-9]+/); \n  print substr($0, RSTART, RLENGTH)\n}' | head -n1)\n      #magic___^_^___line\nHITS=$(echo \"$STATS\" | awk '/^[[:space:]]*Hits:/ {\n  match($0, /[0-9]+/); \n  print substr($0, RSTART, RLENGTH)\n}' | head -n1)\n      #magic___^_^___line\nDIRECT=$(echo \"$STATS\" | awk '/Direct:/ {\n  match($0, /[0-9]+/); \n  print substr($0, RSTART, RLENGTH)\n}' | head -n1)\n      #magic___^_^___line\nif [ \"${CACHEABLE:-0}\" -gt 0 ]; then\n  HIT_RATE=$(awk -v h=\"${HITS:-0}\" -v c=\"$CACHEABLE\" 'BEGIN{printf \"%.1f\", (h/c)*100}')\n  DIRECT_RATE=$(awk -v d=\"${DIRECT:-0}\" -v c=\"$CACHEABLE\" 'BEGIN{printf \"%.1f\", (d/c)*100}')\nelse\n  HIT_RATE=\"0.0\"\n  DIRECT_RATE=\"0.0\"\nfi\n      #magic___^_^___line\necho \"hit_rate=${HIT_RATE}%\"\necho \"direct_rate=${DIRECT_RATE}%\"\n      #magic___^_^___line\nif [ \"${{ inputs.clear_stats }}\" = \"true\" ]; then\n  echo \"=== ccache reset ===\"\n  echo \"=====================\"\n  ccache -z || true\n  echo \"=====================\"\n      #magic___^_^___line\n  # Touch all files to prevent LRU eviction of freshly restored cache\n  if [ -d /home/runner/.ccache ] && find /home/runner/.ccache -type f -print -quit 2>/dev/null | grep -q .; then\n    echo \"Updating ccache atime to prevent cache eviction...\"\n    find /home/runner/.ccache -type f -exec touch -t $(date -d \"1 day ago\" +%Y%m%d%H%M) {} +\n    echo \"✅ ccache atime updated\"\n  fi\n  if [ -d /home/runner/.ld_cache ] && find /home/runner/.ld_cache -type f -print -quit 2>/dev/null | grep -q .; then\n    echo \"Updating LTO cache atime to prevent cache eviction...\"\n    find /home/runner/.ld_cache -type f -exec touch -t $(date -d \"1 day ago\" +%Y%m%d%H%M) {} +\n    echo \"✅ LTO cache atime updated\"\n  fi\nelse\n  echo \"Keeping ccache stats for next run\"\nfi\n      #magic___^_^___line\n"
    - name: Show ccache folder Stats
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        source /tmp/cache_summary.sh

        echo "==============="
        echo "=== .ccache ==="
        echo "==============="
        summarize_dir /home/runner/.ccache 10 5 || true

    - name: Show Bazel Cache folder Stats
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        source /tmp/cache_summary.sh
        echo "===================="
        echo "=== .cache/bazel ==="
        echo "===================="
        summarize_dir /home/runner/.cache/bazel 10 5 || true

    - name: Show ld cache folder Stats
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        source /tmp/cache_summary.sh
        echo "================="
        echo "=== .ld_cache ==="
        echo "================="
        summarize_dir /home/runner/.ld_cache 10 5 || true

