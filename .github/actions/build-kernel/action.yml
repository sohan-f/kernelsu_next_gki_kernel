name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'
inputs:
  bypass:
    description: 'Whether to add the bypass hack or not'
    required: true
  version:
    description: 'Kernel config version (e.g., android14-6.1)'
    required: true

runs:
  using: composite
  steps:
  - name: 'Activate Bypass'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    env:
      INPUT_BYPASS: ${{ inputs.bypass }}
      INPUT_VERSION: ${{ inputs.version }}
      WORKSPACE: ${{ github.workspace }}
    run: |
      set -euo pipefail
      if [ "$INPUT_BYPASS" = "true" ]; then
        if [[ "$INPUT_VERSION" == "android14-6.1" || "$INPUT_VERSION" == "android15-6.6" || "$INPUT_VERSION" == "android16-6.12" ]]; then
          TARGET_FILE="$WORKSPACE/kernel/common/kernel/module/version.c"
        else
          TARGET_FILE="$WORKSPACE/kernel/common/kernel/module.c"
        fi

        sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"

        if ! grep -A 5 "bad_version:" "$TARGET_FILE" | grep -q "return 1;"; then
          echo "Patch failed! 'return 1;' not found at bad_version:"
          grep -A 10 "bad_version:" "$TARGET_FILE" || true
          exit 1
        fi
      else
        echo "Bypass hack not applied as per input parameter."
      fi

  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    env:
      INPUT_BYPASS: ${{ inputs.bypass }}
      INPUT_VERSION: ${{ inputs.version }}
      WORKSPACE: ${{ github.workspace }}
    run: |
      set -euo pipefail
      cat common/arch/arm64/configs/gki_defconfig
      sed -i 's/check_defconfig//' ./common/build.config.gki
      
      if [ -f "build/build.sh" ]; then
        BUILD_GKI_ARTIFACTS= \
        BUILD_GKI_CERTIFICATION_TOOLS=0 \
        BUILD_SYSTEM_DLKM=0 \
        SKIP_VENDOR_BOOT=1 \
        SKIP_EXT_MODULES=1 \
        SKIP_CP_KERNEL_HDR=1 \
        OUT_DIR="/home/runner/out" \
        LTO=thin \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="/usr/bin/ccache clang" \
        CXX="/usr/bin/ccache clang+" \
        HOSTCC="/usr/bin/ccache clang" \
        HOSTCXX="/usr/bin/ccache clang+" \
        LD="$WORKSPACE/kernel/common/ld-wrapper" \
        HOSTLD="$WORKSPACE/kernel/common/ld-wrapper"
      else
        if [[ "$INPUT_VERSION" == "android16-6.12" ]]; then
          if [ "$INPUT_BYPASS" = "false" ]; then
            sed -i '/name = "kernel_aarch64",/a\    check_defconfig = "disabled",' common/BUILD.bazel
          fi
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --destdir=/home/runner/out
        else
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --dist_dir=/home/runner/out
        fi
      fi

      cat /home/runner/out/common/.config || true

  - name: 'Gather Build Artifacts'
    shell: bash
    working-directory: ${{ github.workspace }}
    env:
      INPUT_BYPASS: ${{ inputs.bypass }}
      WORKSPACE: ${{ github.workspace }}
    run: |
      set -euo pipefail
      
      if [ -f "/home/runner/out/dist/Image" ]; then
        IMAGE_PATH="/home/runner/out/dist/Image"
        echo "Found Image at $IMAGE_PATH"
        if [ "$INPUT_BYPASS" = "true" ]; then
          cp "$IMAGE_PATH" "$WORKSPACE/AnyKernel3/Bypass-Image"
        else
          cp "$IMAGE_PATH" "$WORKSPACE/AnyKernel3/Image"
          echo "Kernel Version:"
          strings "$IMAGE_PATH" | grep -m1 "^Linux version "
        fi
      elif [ -f "/home/runner/out/Image" ]; then
        IMAGE_PATH="/home/runner/out/Image"
        echo "Found Image at $IMAGE_PATH"
        if [ "$INPUT_BYPASS" = "true" ]; then
          cp "$IMAGE_PATH" "$WORKSPACE/AnyKernel3/Bypass-Image"
        else
          cp "$IMAGE_PATH" "$WORKSPACE/AnyKernel3/Image"
        fi
      else
        echo "Error: No kernel Image found in expected build output paths."
        exit 1
      fi

  - name: 'Patch AnyKernel3 for Bypass Hack'
    shell: bash
    if: ${{ inputs.bypass == 'true' }}
    working-directory: ${{ github.workspace }}/AnyKernel3
    env:
      ACTION_PATH: ${{ github.action_path }}
      WORKSPACE: ${{ github.workspace }}
    run: |
      set -euo pipefail
      cp "$ACTION_PATH/patches/bypass.patch" "$WORKSPACE/AnyKernel3/bypass.patch"
      patch -p1 < bypass.patch
