runs:
  using: "composite"
  steps:
    - name: Apply Kernel Name Branding
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        VERSION="${{ inputs.version }}"
        ANDROID_PART=$(echo "$VERSION" | cut -d- -f1)
        KERNEL_PART=$(echo "$VERSION" | cut -d- -f2)

        SCM_COUNT="8"
        GIT_HASH="88d70c0b44bf"
        BUILD_NUM="14541233"
        PAGE_SIZE="4k"

        if [[ "$VERSION" == "android15-6.6" || "$VERSION" == "android16-6.12" ]]; then
          KERNEL_STRING="$KERNEL_PART.${{ inputs.sublevel }}-$ANDROID_PART"
        else
          KERNEL_STRING="-$ANDROID_PART"
        fi

        FULL_STRING="$KERNEL_STRING-$SCM_COUNT-g$GIT_HASH-ab$BUILD_NUM-$PAGE_SIZE"

        sed -i '$d' scripts/setlocalversion
        echo "echo \"$FULL_STRING\"" >> scripts/setlocalversion
        chmod +x scripts/setlocalversion