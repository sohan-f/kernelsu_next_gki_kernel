name: Kernel Build Process
permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sublevel:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      variant:
        required: false
        type: string
      release_variant:
        required: false
        type: string
        default: ""
      feature_set:
        required: true
        type: string
      ksu_branch:
        required: false
        type: string
        default: ""
      susfs_commit:
        required: false
        type: string
        default: ""

jobs:
  build-gki:
    name: "${{ inputs.kernel_version }}.${{ inputs.sublevel }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }} (${{ inputs.variant }})"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Emergency Disk Cleanup
      if: false
      uses: ./.github/actions/disk-cleanup

    - name: Free Disk Space
      if: true
      uses: endersonmenezes/free-disk-space@v3  # Use @main for latest, @v3 for stable
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
        rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
        testing: false

    - name: Setup more Swap (for LTO)
      uses: thejerrybao/setup-swap-space@v1   # or pierotofy/set-swap-space
      with:
        swap-size-gb: 16          # 10-24 GB is common for heavy LTO
        # swap-space-path: /mnt/swapfile   # optional

    - name: Setup Build Environment
      uses: ./.github/actions/setup-build-environment
      env:
        BOOT_SIGN_KEY: ${{ secrets.BOOT_SIGN_KEY }}

    - name: Download Kernel Repository
      uses: ./.github/actions/download-kernel
      with:
        version: ${{ inputs.version }}
        android_version: ${{ inputs.android_version }}
        kernel_version: ${{ inputs.kernel_version }}
        os_patch_level: ${{ inputs.os_patch_level }}
        release_variant: ${{ inputs.release_variant }}

    - name: Set Build Timestamp from Kernel Commit
      shell: bash
      run: |
        set -x
        # Hardcode the build timestamp to a fixed date/time so the kernel
        # version string reads: "#1 SMP PREEMPT Thu Dec  4 13:13:47 UTC 2025"
        FIXED_BUILD_DATE="2025-12-04 13:13:47 UTC"
        SOURCE_DATE_EPOCH=$(date -u -d "$FIXED_BUILD_DATE" +%s)
        echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >> $GITHUB_ENV
        KBUILD_TS=$(date -u -d @${SOURCE_DATE_EPOCH} '+%a %b %d %H:%M:%S UTC %Y')
        echo "KBUILD_BUILD_TIMESTAMP=${KBUILD_TS}" >> $GITHUB_ENV
        # Keep git metadata aligned with the same fixed timestamp.
        GIT_DATE=$(date -u -d @${SOURCE_DATE_EPOCH} '+%Y-%m-%dT%H:%M:%SZ')
        echo "GIT_COMMITTER_DATE=${GIT_DATE}" >> $GITHUB_ENV
        echo "GIT_AUTHOR_DATE=${GIT_DATE}" >> $GITHUB_ENV
        echo "Build timestamp set to: $(date -u -d @${SOURCE_DATE_EPOCH} '+%Y-%m-%d %H:%M:%S UTC') (epoch: $SOURCE_DATE_EPOCH)"

    - name: Extract Sublevel and Set File Name
      id: extract
      uses: ./.github/actions/extract-sublevel-file-name
      with:
        android_version: ${{ inputs.android_version }}
        kernel_version: ${{ inputs.kernel_version }}
        sublevel: ${{ inputs.sublevel }}
        os_patch_level: ${{ inputs.os_patch_level }}
        variant: ${{ inputs.variant }}

    - name: Kernel Fixes
      uses: ./.github/actions/kernel-fixes
      with:
        version: ${{ inputs.version }}
        android_version: ${{ inputs.android_version }}
        kernel_version: ${{ inputs.kernel_version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}
        os_patch_level: ${{ inputs.os_patch_level }}

    - name: Setup KernelSU-Next
      if: contains(inputs.feature_set, 'KSUN') || inputs.feature_set == 'FULL'
      uses: ./.github/actions/kernelsu
      with:
        ksu_branch: ${{ inputs.ksu_branch }}

    - name: SUSFS
      if: contains(inputs.feature_set, 'SUSFS') || inputs.feature_set == 'FULL'
      uses: ./.github/actions/susfs
      with:
        susfs_commit: ${{ inputs.susfs_commit }}
        version: ${{ inputs.version }}
        android_version: ${{ inputs.android_version }}
        kernel_version: ${{ inputs.kernel_version }}
        os_patch_level: ${{ inputs.os_patch_level }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: Baseband Guard
      if: (contains(inputs.feature_set, 'BBG') || inputs.feature_set == 'FULL')
      uses: ./.github/actions/bbg

    - name: Setup Networking
      if: contains(inputs.feature_set, 'NET') || inputs.feature_set == 'FULL'
      uses: ./.github/actions/networking
      with:
        version: ${{ inputs.version }}
        kernel_version: ${{ inputs.kernel_version }}
        android_version: ${{ inputs.android_version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: DroidSpaces-OSS Patches
      if: contains(inputs.feature_set, 'DS') || inputs.feature_set == 'FULL'
      uses: ./.github/actions/droidspaces
      with:
        version: ${{ inputs.version }}
        kernel_version: ${{ inputs.kernel_version }}

    - name: Apply NTSync Patches
      uses: ./.github/actions/ntsync
      with:
        version: ${{ inputs.version }}
        kernel_version: ${{ inputs.kernel_version }}

    - name: Apply Ptrace Patch
      uses: ./.github/actions/ptrace
      with:
        kernel_version: ${{ inputs.kernel_version }}

    - name: Apply Unicode Fix Patch
      uses: ./.github/actions/unicode-fix
      with:
        kernel_version: ${{ inputs.kernel_version }}

    - name: Apply Performance Patches
      uses: ./.github/actions/performance
      if: false
      with:
        kernel_version: ${{ inputs.kernel_version }}

    - name: Setup Misc Configs
      uses: ./.github/actions/misc

    - name: Apply ABI Compare Bypass
      if: false
      working-directory: ${{ github.workspace }}/kernel
      run: |
        # Only android15-6.6 is built from this repo, so this is the only branch kept.
        perl -i -pe 's/^(\s*)return 1$/$1print("Who Cares? Bypassing Now!")\n$1return 0/g if /if missing_symbols:/../return 1/' build/kernel/abi/check_buildtime_symbol_protection.py

    - name: Apply Kernel Branding
      uses: ./.github/actions/apply-kernel-branding
      with:
        variant: ${{ inputs.variant }}
        kernel_version: ${{ inputs.kernel_version }}
        android_version: ${{ inputs.android_version }}
        version: ${{ inputs.version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: Remove Protected Exports
      uses: ./.github/actions/remove-protected-exports

    - name: Clean Kernel Flags
      uses: ./.github/actions/clean-kernel-flags

    - name: Scan and collect patch rejects
      id: scan
      if: ${{ always() }}
      uses: ./.github/actions/scan-patch-rejects

    - name: Upload Rejects
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.extract.outputs.file_name }}-Rejects
        path: patch-rejects/
        if-no-files-found: ignore
        compression-level: 9

    - name: Get prebuilt ccache (downloaded once by prepare-ccache)
      uses: actions/download-artifact@v8
      with:
        name: ccache-binary
        path: ccache-dl
      continue-on-error: true

    - name: 'Setup Cache and Build Environment'
      uses: ./.github/actions/cache-setup
      with:
        version: ${{ inputs.version }}
        android_version: ${{ inputs.android_version }}
        kernel_version: ${{ inputs.kernel_version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: Restore bazel-cache
      id: restore-bazel
      continue-on-error: true
      uses: ./.github/actions/cache-restore
      with:
        cache_path: /home/runner/.cache/bazel
        cache_key: ${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ steps.extract.outputs.sublevel }}-${{ inputs.os_patch_level }}
        cache_bucket: bazel-cache
        restore_keys: |
          ${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ steps.extract.outputs.sublevel }}-

    - name: Check cache hit
      run: |
        echo "Cache restore status:"
        echo "  bazel: ${{ steps.restore-bazel.outputs.cache-hit || 'skipped' }}"

    - name: Get Cache Stats
      uses: ./.github/actions/cache-stats
      with:
        clear_stats: true

    - name: Initialize Config Fragment
      run: touch "${{ github.workspace }}/wild_gki.fragment"

    - name: Build Normal Kernel
      env:
        SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
        KBUILD_BUILD_TIMESTAMP: ${{ env.KBUILD_BUILD_TIMESTAMP }}
      uses: ./.github/actions/build-kernel
      with:
        version: ${{ inputs.version }}
        bypass: false

    - name: Get Cache Stats
      uses: ./.github/actions/cache-stats
      with:
        clear_stats: false

    - name: Save bazel-cache
      continue-on-error: true
      uses: ./.github/actions/cache-save
      with:
        cache_path: /home/runner/.cache/bazel
        cache_key: ${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ steps.extract.outputs.sublevel }}-${{ inputs.os_patch_level }}
        cache_bucket: "bazel-cache"
        compression_level: 9
        github_token: ${{ secrets.MY_GITHUB_TOKEN }}

    - name: Build Bypass Kernel
      env:
        SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
        KBUILD_BUILD_TIMESTAMP: ${{ env.KBUILD_BUILD_TIMESTAMP }}
      uses: ./.github/actions/build-kernel
      with:
        bypass: true
        version: ${{ inputs.version }}

    - name: Consolidated Build Summary
      if: ${{ always() }}
      shell: bash
      run: |
        SUMMARY_FILE="/tmp/build-summary-${{ steps.extract.outputs.file_name }}.md"
        
        # Determine build status
        if [ "${{ job.status }}" = "success" ]; then
          STATUS="SUCCESS"
        else
          STATUS="FAILED"
        fi
        
        # Get kernel version from Image if available
        KERNEL_VER_STR=""
        if [ -f "/home/runner/out/dist/Image" ]; then
          KERNEL_VER_STR=$(strings "/home/runner/out/dist/Image" | grep -m1 "^Linux version " | sed 's/Linux version //' || echo "")
        elif [ -f "/home/runner/out/Image" ]; then
          KERNEL_VER_STR=$(strings "/home/runner/out/Image" | grep -m1 "^Linux version " | sed 's/Linux version //' || echo "")
        fi
        
        # Get KSU version from env (set by kernelsu action)
        KSU_VER="${KSU_VERSION:-N/A}"
        KSU_TAG="${KSU_GIT_TAG:-N/A}"
        
        # Get SUSFS version from susfs.h if available
        SUSFS_VER="N/A"
        if [ -f "${{ github.workspace }}/kernel/common/include/linux/susfs.h" ]; then
          SUSFS_VER=$(grep '#define SUSFS_VERSION' "${{ github.workspace }}/kernel/common/include/linux/susfs.h" | awk -F'"' '{print $2}' || echo "N/A")
        fi
        
        # Get cache stats from env (set by cache-stats action)
        CCACHE_HIT="${CCACHE_HIT_RATE:-N/A}"
        
        # Get build time (approximate from step timing)
        BUILD_TIME="N/A"
        
        # Count warnings from build log if available
        WARNINGS="N/A"
        
        {
          echo "## ${{ inputs.android_version }} ${{ inputs.kernel_version }}.${{ inputs.sublevel }} (${{ inputs.variant }}) - ${STATUS}"
          echo
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| **Status** | ${STATUS} |"
          echo "| **Kernel** | ${{ inputs.kernel_version }}.${{ inputs.sublevel }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }} |"
          if [ -n "$KERNEL_VER_STR" ]; then
            echo "| **Version String** | \`${KERNEL_VER_STR}\` |"
          fi
          echo "| **KSU Version** | ${KSU_VER} |"
          echo "| **KSU Tag** | ${KSU_TAG} |"
          echo "| **SUSFS Version** | ${SUSFS_VER} |"
          echo "| **Feature Set** | ${{ inputs.feature_set }} |"
          echo "| **Variant** | ${{ inputs.variant }} |"
          echo
          
          # Kernel Fixes
          if [ -f /tmp/kernel-fixes-summary.md ]; then
            echo "### Kernel Fixes"
            cat /tmp/kernel-fixes-summary.md
            echo
          fi
        } > "$SUMMARY_FILE"

    - name: Upload Build Summary Artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.extract.outputs.file_name }}-Summary
        path: /tmp/build-summary-${{ steps.extract.outputs.file_name }}.md
        if-no-files-found: ignore
        compression-level: 9

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.extract.outputs.file_name }}-AnyKernel3
        path: ${{ github.workspace }}/AnyKernel3/**
        if-no-files-found: ignore
        compression-level: 9

